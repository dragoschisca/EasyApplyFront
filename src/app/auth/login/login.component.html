<div class="auth-container">
  <div class="login-container">
    <h2>Login</h2>
    <form (ngSubmit)="login()">
      <input type="email" placeholder="Email" [(ngModel)]="email" name="email" required />
      <input type="password" placeholder="Parolă" [(ngModel)]="password" name="password" required />
      <button type="submit">Login</button>
    </form>
    <p>Nu ai cont? <a routerLink="/signup">Signup</a></p>
  </div>
</div>
